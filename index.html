<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농업회사법인 수성(주) - 바이오황 통합 자료실</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f8f9fa;
        }
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .category-section {
            margin-bottom: 3rem;
        }
        .category-title {
            font-size: 1.5rem;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            background: #fff;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 0 5px 5px 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .item-card {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
        }
        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .item-number {
            background: var(--accent-color);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .item-name {
            font-weight: 500;
            font-size: 1rem;
        }
        .download-icon {
            color: #95a5a6;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>농업회사법인 수성(주) 바이오황 자료실</h1>
    <p>Bio-Sulfur Integration Data Center</p>
</header>

<div class="container" id="content-display">
    </div>

<footer>
    &copy; 2026 농업회사법인 수성(주). All Rights Reserved.
</footer>

<script>
    /**
     * 자료 데이터 설정 (수정/추가/삭제 시 이 배열만 편집하세요)
     * - sectionTitle: 카테고리 제목
     * - items: [ { name: "표시될 이름", file: "GitHub에 올린 파일명" }, ... ]
     */
    const libraryData = [
        {
            sectionTitle: "1. 한국어 자료 (축산/수산/농작물)",
            items: [
                { name: "한우", file: "Bio-Sulfur_한우_Innovation.pdf" },
                { name: "돼지", file: "K-Premium_Bio-Sulfur_돼지.pdf" },
                { name: "육계", file: "바이오황(Bio-Sulfur) 기술 기반 글로벌 프리미엄 육계 산업화 전략.pdf" },
                { name: "달걀", file: "13_바이오황(Bio-Sulfur) 기술 기반 글로벌 프리미엄 달걀 사업제안서.pdf" },
                { name: "수산물", file: "수협 프리미엄 수산 혁신 제안서_수정본_1113_최종_0210_바이오황.pdf" },
                { name: "기타 농작물 (벼, 과일 등)", file: "배추 재배 바이오황 활용 기술 제안_0317_2.pdf" },
                { name: "인증서 및 시험성적서", file: "수성바이오황설명_바이오황 사료_비료_인증서_각종시험성적서_태스트결과모음_260212.pdf" },
                { name: "기타 참고자료", file: "일반_바이오황비료_제안서260326.pdf" }
            ]
        },
        {
            sectionTitle: "2. 농협 및 지자체 관련 자료",
            items: [
                { name: "농협중앙회", file: "요약-법제유황 기반 프리미엄 농축산물 혁신 공동사업 제안.pdf" },
                { name: "거진농협", file: "요약-법제유황 기반 프리미엄 농축산물 혁신 공동사업 제안.pdf" },
                { name: "고성축협", file: "Bio-Sulfur_한우_Innovation.pdf" },
                { name: "수협", file: "수협 프리미엄 수산 혁신 제안서_수정본_1113_최종_0210_바이오황.pdf" }
                // 필요시 PDF 목록에 맞춰 계속 추가 가능
            ]
        },
        {
            sectionTitle: "3. 일본어 자료 (Global Strategy)",
            items: [
                { name: "달걀 사업제안서", file: "13_바이오황(Bio-Sulfur) 기술 기반 글로벌 프리미엄 달걀 사업제안서.pdf" },
                { name: "돼지 제안서 (국제실증)", file: "국제적 실증에 기초한 프리미엄급 돼지 제안서_260324.pdf" },
                { name: "한우 제안서 (국제실증)", file: "국제적 실증에 기초한 프리미엄급 한우 제안서_0316.pdf" },
                { name: "일본 농업시장 진입 전략", file: "일본진출농업.pdf" }
            ]
        }
    ];

    const displayContainer = document.getElementById('content-display');

    function renderLibrary() {
        displayContainer.innerHTML = ''; // 초기화
        
        libraryData.forEach((section) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'category-section';
            
            const title = document.createElement('h2');
            title.className = 'category-title';
            title.textContent = section.sectionTitle;
            sectionDiv.appendChild(title);
            
            const grid = document.createElement('div');
            grid.className = 'item-grid';
            
            section.items.forEach((item, index) => {
                const card = document.createElement('a');
                card.className = 'item-card';
                // GitHub Pages 경로: index.html과 같은 위치에 파일이 있다고 가정
                card.href = `./${encodeURIComponent(item.file)}`;
                card.target = '_blank'; // 새 창에서 열기
                
                card.innerHTML = `
                    <div class="item-info">
                        <div class="item-number">${index + 1}</div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <div class="download-icon">📥</div>
                `;
                grid.appendChild(card);
            });
            
            sectionDiv.appendChild(grid);
            displayContainer.appendChild(sectionDiv);
        });
    }

    renderLibrary();
</script>

</body>
</html>
